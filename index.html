<!DOCTYPE html>
<html>
<head>
  <title>Spatial Depth Viewer v3</title>
  <style>
    body { margin: 0; overflow: hidden; background: #111; }
    canvas { display: block; }
  </style>
</head>

<body>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1,1,1,-1,0,1);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const loader = new THREE.TextureLoader();

const colorTex = loader.load("image.jpg");
const depthTex = loader.load("depth.png");

const material = new THREE.ShaderMaterial({
  uniforms: {
    colorTex: { value: colorTex },
    depthTex: { value: depthTex },
    mouse: { value: new THREE.Vector2(0,0) }
  },

  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = vec4(position, 1.0);
    }
  `,

  fragmentShader: `
    uniform sampler2D colorTex;
    uniform sampler2D depthTex;
    uniform vec2 mouse;

    varying vec2 vUv;

    void main() {

      float depth = texture2D(depthTex, vUv).r;

      // stronger depth = more movement
      vec2 offset = mouse * (depth * 0.25);

      vec2 uv = vUv + offset;

      gl_FragColor = texture2D(colorTex, uv);
    }
  `
});

const geometry = new THREE.PlaneGeometry(2, 2);
const mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);

window.addEventListener("mousemove", (e) => {
  const x = (e.clientX / window.innerWidth - 0.5) * 2;
  const y = (e.clientY / window.innerHeight - 0.5) * -2;

  material.uniforms.mouse.value.set(x, y);
});

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
