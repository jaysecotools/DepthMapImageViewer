<!DOCTYPE html>
<html>
<head>
  <title>Depth Parallax Viewer</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .frame {
      width: 650px;
      height: 420px;
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = 650;
canvas.height = 420;

const image = new Image();
const depth = new Image();

image.src = "image.jpg";
depth.src = "depth.png";

let mouseX = 0;
let mouseY = 0;

document.addEventListener("mousemove", (e) => {
  mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (image.complete && depth.complete) {

    // fake depth offset (simple but effective first version)
    const offsetX = mouseX * 20;
    const offsetY = mouseY * 20;

    ctx.drawImage(image, offsetX, offsetY, canvas.width, canvas.height);
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
